# environment and task
env:
  name: rocket_lander_v0
  task: ""
  library: custom
  threshold: 0.1
  max_episode_steps: 1000
  seed: 42

  # Rocket design and configuration
  rocket:
    design: v0  # v0 (cylinder), v1 (two_legs), v2 (tripod)

  # Domain randomization settings
  domain_randomization:
    enabled: false
    mass_range: [0.8, 1.2]
    thrust_range: [0.9, 1.1]
    gravity_range: [9.0, 10.5]
    initial_height_range: [40.0, 60.0]
    initial_velocity_range: [-2.0, 2.0]
    initial_orientation_range: [-5.0, 5.0]

  # Reward weights for different components
  reward_weights:
    position: 1.0
    orientation: 1.0
    velocity: 1.0
    angular_velocity: 1.0
    distance: 1.0
    success_bonus: 100.0
    crash_penalty: -50.0
    tip_over_penalty: -30.0

# collector
collector:
  total_frames: 1_000_000
  init_random_frames: 25000
  frames_per_batch: 1000
  init_env_steps: 1000
  device: cpu
  env_per_collector: 1
  reset_at_each_iter: False

# replay buffer
replay_buffer:
  size: 1000000
  prb: 0 # use prioritized experience replay
  scratch_dir: null

# optim
optim:
  utd_ratio: 1.0
  gamma: 0.99
  loss_function: l2
  lr: 3.0e-4
  weight_decay: 0.0
  batch_size: 256
  target_update_polyak: 0.995
  alpha_init: 1.0
  adam_eps: 1.0e-8

# network
network:
  hidden_sizes: [256, 256]
  activation: relu
  default_policy_scale: 1.0
  scale_lb: 0.1
  device:

# logging
logger:
  backend: wandb
  project_name: SpaceX-Landing
  group_name: null
  exp_name: ${env.name}_SAC
  mode: online
  eval_iter: 20000
  video: True
  log_reward_components: true
  log_crash_breakdown: true
