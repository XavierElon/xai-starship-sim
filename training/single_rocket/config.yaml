# environment and task
env:
  name: rocket_lander_v0
  task: ""
  library: custom
  threshold: 0.1
  max_episode_steps: 1000
  seed: 42

  # Rocket design and configuration
  rocket:
    design: v0  # v0 (cylinder), v1 (two_legs), v2 (tripod)

  # Domain randomization settings (tight defaults for stable training)
  domain_randomization:
    enabled: false
    mass_range: [0.95, 1.05]       # ±5% mass
    thrust_range: [0.95, 1.05]     # ±5% thrust
    gravity_range: [9.7, 9.9]      # Tight around Earth's 9.81
    initial_height_range: [48.0, 52.0]  # ±4m around 50m
    initial_velocity_range: [-0.5, 0.5]  # Small perturbations
    initial_orientation_range: [-2.0, 2.0]  # ±2° tilt

  # Termination conditions
  termination:
    max_distance: 20.0    # Max horizontal distance from pad (meters)
    max_angle: 70.0       # Max roll/pitch angle (degrees)

  # Reward weights (exponential shaping, per-step components in [0,1])
  reward_weights:
    distance: 0.7
    velocity: 0.15
    upright: 0.1
    angular: 0.05
    success: 100.0
    crash: -10.0
    tipover: -10.0

  # Curriculum learning settings
  curriculum:
    enabled: false
    heights: [5.0, 10.0, 20.0, 35.0, 50.0]
    success_threshold: 0.7  # 70% success rate to advance
    window_size: 100  # Episodes to average over

# collector
collector:
  total_frames: 1_000_000
  init_random_frames: 25000
  frames_per_batch: 1000
  init_env_steps: 1000
  device: cpu
  env_per_collector: 1
  reset_at_each_iter: False

# replay buffer
replay_buffer:
  size: 1000000
  prb: 0 # use prioritized experience replay
  scratch_dir: null

# optim
optim:
  utd_ratio: 1.0
  gamma: 0.99
  loss_function: l2
  lr: 3.0e-4
  weight_decay: 0.0
  batch_size: 256
  target_update_polyak: 0.995
  alpha_init: 1.0
  adam_eps: 1.0e-8

# network
network:
  hidden_sizes: [256, 256]
  activation: relu
  default_policy_scale: 1.0
  scale_lb: 0.1
  device:

# logging
logger:
  backend: wandb
  project_name: SpaceX-Landing
  group_name: null
  exp_name: ${env.name}_SAC
  mode: online
  eval_iter: 20000
  video: True
  log_reward_components: true
  log_crash_breakdown: true
