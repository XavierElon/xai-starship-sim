# PPO training with GPU-parallel MuJoCo Warp environments
env:
  name: rocket_lander_warp
  library: custom
  max_episode_steps: 1000
  seed: 42
  num_envs: 4096

  # Rocket design and configuration
  rocket:
    design: demo  # detailed tripod with legs for visualization

  # Reward weights (exponential shaping, per-step components in [0,1])
  reward_weights:
    distance: 0.6
    velocity: 0.25
    upright: 0.1
    angular: 0.05
    success: 500.0
    crash: -10.0
    tipover: -10.0

  # Velocity penalty shaping (exponential gate near ground)
  velocity_penalty:
    gate_scale: 15.0    # height scale for danger zone (meters)
    coeff: 5.0          # steepness of velocity penalty - strong near ground

  # Termination conditions
  termination:
    max_distance: 20.0
    max_angle: 70.0

  # Reset noise (domain randomization for initial conditions)
  reset_noise:
    pos: 3.0      # xy position noise in meters
    vel: 3.0      # linear velocity noise in m/s
    ang: 0.15     # angular noise in radians (~8 degrees)
    angvel: 0.3   # angular velocity noise in rad/s

# collector
collector:
  total_frames: 50_000_000
  frames_per_batch: 65536  # 4096 envs * 16 steps
  device: cuda

# PPO loss hyperparameters
loss:
  clip_epsilon: 0.2
  entropy_coeff: 0.01
  critic_coeff: 0.5
  loss_critic_type: l2
  ppo_epochs: 4
  mini_batch_size: 4096
  gamma: 0.99
  gae_lambda: 0.97
  max_grad_norm: 0.5
  anneal_lr: true
  anneal_clip_epsilon: true

# optim
optim:
  lr: 3.0e-4
  device: cuda

# network
network:
  hidden_sizes: [256, 256]
  activation: tanh
  device: cuda

# logging
logger:
  backend: wandb
  project_name: SpaceX-Landing
  group_name: null
  exp_name: ${env.name}_PPO_GPU
  mode: online
  eval_iter: 5_000_000
  video: true
  log_crash_breakdown: true
