# GPU-parallel training with MuJoCo Warp
env:
  name: rocket_lander_warp
  library: custom
  max_episode_steps: 1000
  seed: 42
  num_envs: 4096

  # Rocket design and configuration
  rocket:
    design: v0  # v0 (cylinder), v1 (two_legs), v2 (tripod)

  # Reward weights
  reward_weights:
    position: 1.0
    orientation: 1.0
    velocity: 1.0
    angular_velocity: 1.0
    distance: 1.0
    success_bonus: 100.0
    crash_penalty: -50.0
    tip_over_penalty: -30.0

  # Termination conditions
  termination:
    max_distance: 20.0
    max_angle: 70.0

  # Curriculum learning settings
  curriculum:
    enabled: false
    heights: [5.0, 10.0, 20.0, 35.0, 50.0]
    success_threshold: 0.7
    window_size: 100

# collector
collector:
  total_frames: 10_000_000
  init_random_frames: 100000
  frames_per_batch: 4096  # One step from all envs
  device: cuda
  env_per_collector: 1  # Single warp env handles all parallelism

# replay buffer (on GPU — keep small to fit VRAM)
replay_buffer:
  size: 100000
  prb: 0

# optim - tuned for high-throughput GPU training
optim:
  utd_ratio: 4.0  # Higher UTD for better sample efficiency with fast collection
  gamma: 0.99
  loss_function: l2
  lr: 3.0e-4
  weight_decay: 0.0
  batch_size: 1024  # Larger batch for GPU
  target_update_polyak: 0.995
  alpha_init: 1.0
  adam_eps: 1.0e-8

# network
network:
  hidden_sizes: [256, 256]
  activation: relu
  default_policy_scale: 1.0
  scale_lb: 0.1
  device: cuda

# logging
logger:
  backend: wandb
  project_name: SpaceX-Landing
  group_name: null
  exp_name: ${env.name}_SAC_GPU
  mode: online
  eval_iter: 50000
  video: false  # Warp env doesn't support pixel rendering
  log_reward_components: true
  log_crash_breakdown: true
