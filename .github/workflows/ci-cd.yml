name: Rocket Simulator CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false # required for auto-commit to work reliably

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (CPU version)
        run: uv sync

      - name: Auto-format with Black
        run: uv run --with black black .

      - name: Auto-commit formatted files (if any changes)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-format with black'
          file_pattern: '*.py'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Smoke test training (CPU Gym path; no mujoco_warp in CI)
        run: |
          cd training
          uv run python train_ppo.py --config-name=config_ppo_cpu \
            env.rocket.design=v0 \
            env.num_envs=8 \
            collector.total_frames=10000 \
            logger.backend= \
            logger.video=false \
            logger.mode=offline

      - name: Render demo video (only on main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          cd ..
          if [ -f training/checkpoints/ppo_final.pt ]; then
            uv run python env/demo_render.py --checkpoint training/checkpoints/ppo_final.pt --headless || echo "Render skipped"
          else
            echo "No checkpoint yet - skipping video render"
          fi

      - name: Upload landing video artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: falcon9-landing-video
          path: videos/
          retention-days: 30
